[Rainmeter]
Update=1000
ContextTitle="Open settings"
ContextAction=["NotePad" "#@#UserSettings.ini"]

[Metadata]
Name=Desktop folder launcher
Author=Wickham & Sjoti
Information=A skin to launch any program
License=GPL-3.0
Version=1.1


[Variables]
@Include=#@#UserSettings.ini
SizeIcon=0
C=[!UpdateMeasureGroup Circles][!UpdateMeterGroup Circles][!Redraw]
A=[!UpdateMeasureGroup WaitX][!UpdateMeterGroup WaitX][!Redraw]
I=[!UpdateMeasureGroup Icons][!UpdateMeterGroup Icons][!UpdateMeter MeterSpin][!Redraw]
ChangeIcon=16
Fader=0
IconHider=1
IconSize=64
SpeedDivider=300
IconCircleDistance=16
Resetter=0
CircleScale=1.0
LineLengthScale=1.0
LineStartScale=1.0

[MeterialYou]
Measure=Plugin
Plugin=MeterialYou
DynamicVariables=1


[MeasureCalcPosition]
Measure=Calc
Formula=Sin(1/4*PI)

[MeasureCalcPosition2]
Measure=Calc
Formula=Cos(1/4*PI)

[MeasureFader]
Measure=Plugin
Plugin=ActionTimer
Group=Icons
ActionList1=Repeat FadeIn,20,20
FadeIn=[!SetVariable Fader "(Clamp(#Fader#+60,0,1200))"]#I#
ActionList2=Wait 10|Repeat FadeOut,20,33
FadeOut=[!SetVariable Fader "(Clamp(#Fader#-60,0,1200))"]#I#
DynamicVariables=1
UpdateDivider=-1
IfCondition=(#Fader#<1)
IfTrueAction=[!HideMeterGroup Icons]
IfCondition2=(#Fader#>1)
IfTrueAction2=[!ShowMeterGroup Icons]
IfCondition3=(#Fader#>1)
IfTrueAction3=[!HideMeterGroup SmallIcons]
IfCondition4=(#Fader#<=1)
IfTrueAction4=[!ShowMeterGroup SmallIcons]
IgnoreWarnings=1

[MeasureCircleWait]
Measure=Plugin
Plugin=ActionTimer
Group=WaitX
ActionList1=Repeat ClickOn,16,20
ClickOn=[!SetVariable Resetter "(Clamp(#Resetter#+0.5,0,10))"]#A#
ActionList2=Wait 1|Repeat ClickOff,16,20
ClickOff=[!SetVariable Resetter "(Clamp(#Resetter#-0.5,0,10))"]#A#
DynamicVariables=1
UpdateDivider=-1
IgnoreWarnings=1
IfCondition=(#Resetter# > 9)
IfTrueAction=[!CommandMeasure MeasureCircleTimer "Stop 2"][!CommandMeasure MeasureCircleTimer "Execute 1"][!HideMeter MeterSpin]

[MeasureFolder]
Measure=Plugin
Plugin=FileView
Path=#@#Shortcuts
ShowFolder=0
ShowDotDot=0
Count=26

[MeasureScript]
Measure=Script
ScriptFile=#@#GenerateIcons.lua
DynamicVariables=1

[MeasureCircleTimer]
Measure=Plugin
Plugin=ActionTimer
Group=Circles
ActionList1=Repeat ClickOn,16,25
ClickOn=[!SetVariable SizeIcon "(Clamp(#SizeIcon#+0.75,0,#ChangeIcon#))"]#C#
ActionList2=Wait #SpeedDivider#|Repeat ClickOff,16,25
ClickOff=[!SetVariable SizeIcon "(Clamp(#SizeIcon#-0.75,0,#ChangeIcon#))"]#C#
DynamicVariables=1
UpdateDivider=-1
IgnoreWarnings=1
IfCondition=(#SizeIcon# > 0)
IfTrueAction=[!CommandMeasure MeasureCircleWait "Stop 1"][!CommandMeasure MeasureCircleWait "Execute 2"][!HideMeter MeterSpin][!ShowMeter MeterMouseCircle]
IfFalseAction=[!HideMeter MeterMouseCircle][!ShowMeter MeterSpin]#A#
IfCondition2=(#SizeIcon# > (10))
IfTrueAction2=[!CommandMeasure MeasureFader "Stop 2"][!CommandMeasure MeasureFader "Execute 1"]
DynamicVariables=1

[MeterPlaceHolder]
Meter=Image
X=600
Y=600
W=420
H=420
ImageTint=0,0,0,0

[MeasureCalcChange]
Measure=Calc
Group=Icons
Formula=(#IconSize# + 0.5*(0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#)) )

[StyleIcon]
Meter=Image
Group=Icons
Hidden=1
W=58
H=58
ImageTint=255,255,255
DynamicVariables=1
MouseOverAction=[!SetOption #CURRENTSECTION# ImageTint "200,200,200"]#I#
MouseLeaveAction=[!SetOption #CURRENTSECTION# ImageTint "255,255,255"]#I#

[StyleIconSmall]
