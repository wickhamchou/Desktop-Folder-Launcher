[MeterRoundline]
Meter=Roundline
Group=Circles
Solid=1
X=240
Y=240
LineLength=((#IconSize# + 0.5*(0.8*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) *1.1* #LineLengthScale#)
Linecolor=#CircleColor#
LineStart=((#IconSize#*0.8 + 1.2* (-0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * 0.9 * #LineStartScale#)
StartAngle=0
MouseLeaveAction=[!CommandMeasure MeasureFader "Stop 1"][!CommandMeasure MeasureFader "Execute 2"][!CommandMeasure MeasureCircleTimer "Stop 1"][!CommandMeasure MeasureCircleTimer "Execute 2"][!ShowMeter MeterMouseCircleOver][!HideMeter MeterMouseCircle]
ImageTint=255,255,255,255
RotationAngle=6.3
Antialias=1
DynamicVariables=1
Hidden=#HideCircle#

[MeterSpin]
Meter=Roundline
Group=WaitX
Solid=1
X=240
Y=240
LineLength=(#IconSize#*1.2)
Linecolor=#LoadingCircleColor#
LineStart=(#IconSize#*0.7)
StartAngle=0
RotationAngle=((#Resetter#/6.3)*6.3)
Antialias=1
DynamicVariables=1
Hidden=#HideCircle#

[MeterMouseCircle]
Meter=Image
ImageName=#@#circle.png
W=(2 * 1.2 * (((#IconSize#*0.8 + 1.2* (-0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#) + ((#IconSize# + 0.5*(0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#)))
H=(2 * 1.2 * (((#IconSize#*0.8 + 1.2* (-0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#) + ((#IconSize# + 0.5*(0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#)))
X=(240 - 1.2 * (((#IconSize#*0.8 + 1.2* (-0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#) + ((#IconSize# + 0.5*(0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#)))
Y=(240 - 1.2 * (((#IconSize#*0.8 + 1.2* (-0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#) + ((#IconSize# + 0.5*(0.5*(#SizeIcon# * #SizeIcon#) + (4 * #SizeIcon#))) * #CircleScale#)))
MouseLeaveAction=[!CommandMeasure MeasureFader "Stop 1"][!CommandMeasure MeasureFader "Execute 2"][!CommandMeasure MeasureCircleTimer "Stop 1"][!CommandMeasure MeasureCircleTimer "Execute 2"][!ShowMeter MeterMouseCircleOver][!HideMeter MeterMouseCircle]
ImageTint=255,255,255,2
DynamicVariables=1




